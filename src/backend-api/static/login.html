<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCGUARD | Login</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="static/styles.css">
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #111625 0%, #0a0e17 100%);
        }

        .login-card {
            background-color: var(--bg-panel);
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .login-card:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }

        .login-logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-blue);
            margin-bottom: 2.5rem;
            text-shadow: var(--glow-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--accent-blue);
            color: #0a0e17;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-blue);
            background-color: #00e0eb;
        }

        .login-footer {
            margin-top: 2rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .error-message {
            color: var(--accent-red);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
            padding: 0.75rem;
            background-color: rgba(255, 0, 85, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 0, 85, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fa-solid fa-shield-halved"></i> SOCGUARD
            </div>

            <div id="error-msg" class="error-message">Invalid credentials</div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">USERNAME</label>
                    <input type="text" id="username" placeholder="Enter admin username" required>
                </div>
                <div class="form-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-btn">Secure Login</button>
            </form>

            <div class="login-footer">
                <p>&copy; 2026 SOCGUARD Cyber Defense Systems</p>
                <p style="margin-top: 0.5rem; font-family: 'JetBrains Mono', monospace; opacity: 0.5;">SECURE ACCESS
                    ONLY</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    localStorage.setItem('socguard_token', data.token);
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.message || 'Login failed';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = 'Connection error. Is backend running?';
                errorMsg.style.display = 'block';
            }
        });

        // Clear error on input
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                document.getElementById('error-msg').style.display = 'none';
            });
        });
    </script>
</body>

</html>
