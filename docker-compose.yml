services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - socguard-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      # Performance: faster log flushing, limited retention
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 10000
      KAFKA_LOG_FLUSH_INTERVAL_MS: 1000
      KAFKA_LOG_RETENTION_HOURS: 6
      KAFKA_NUM_PARTITIONS: 3
    depends_on:
      - zookeeper
    networks:
      - socguard-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - socguard-net

  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_USER=socguard_user
      - POSTGRES_PASSWORD=socguard_password
      - POSTGRES_DB=socguard_db
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c max_connections=100
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c effective_cache_size=512MB
        -c random_page_cost=1.1
        -c log_min_duration_statement=1000
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socguard_user -d socguard_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - socguard-net

  init-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: init-kafka
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./docker/scripts/init-kafka.sh:/init-kafka.sh
    entrypoint: ["/bin/bash", "/init-kafka.sh"]
    networks:
      - socguard-net

  ingestion-service:
    build: ./src/ingestion-service
    container_name: ingestion-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    environment:
      - KAFKA_BROKER=kafka:29092
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET}
      - EMAIL_CLIENT_ID=${EMAIL_CLIENT_ID}
      - EMAIL_CLIENT_SECRET=${EMAIL_CLIENT_SECRET}
      - EMAIL_REFRESH_TOKEN=${EMAIL_REFRESH_TOKEN}
      - EMAIL_USER_ID=${EMAIL_USER_ID}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BSKY_USERNAME=${BSKY_USERNAME}
      - BSKY_PASSWORD=${BSKY_PASSWORD}
      - BSKY_SEARCH_QUERY=cyber
      - PYTHONUNBUFFERED=1
    volumes:
      - ./socguard_session.session:/app/socguard_session.session
    networks:
      - socguard-net
    deploy:
      resources:
        limits:
          memory: 512M

  text-analysis-service:
    build: ./src/text-analysis-service
    container_name: text-analysis-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    environment:
      - KAFKA_BROKER=kafka:29092
      - TOKENIZERS_PARALLELISM=false
      - OMP_NUM_THREADS=2
      - MKL_NUM_THREADS=2
      - PYTHONUNBUFFERED=1
    volumes:
      - hf_cache_text:/root/.cache/huggingface
    networks:
      - socguard-net
    deploy:
      resources:
        limits:
          memory: 2G

  image-analysis-service:
    build: ./src/image-analysis-service
    container_name: image-analysis-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    environment:
      - KAFKA_BROKER=kafka:29092
      - TOKENIZERS_PARALLELISM=false
      - OMP_NUM_THREADS=2
      - MKL_NUM_THREADS=2
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src/image-analysis-service/fine_tuned_model:/app/fine_tuned_model
      - hf_cache_image:/root/.cache/huggingface
    networks:
      - socguard-net
    deploy:
      resources:
        limits:
          memory: 3G

  audio-analysis-service:
    build: ./src/audio-analysis-service
    container_name: audio-analysis-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    environment:
      - KAFKA_BROKER=kafka:29092
      - TOKENIZERS_PARALLELISM=false
      - OMP_NUM_THREADS=2
      - MKL_NUM_THREADS=2
      - PYTHONUNBUFFERED=1
    volumes:
      - hf_cache_audio:/root/.cache/huggingface
    networks:
      - socguard-net
    deploy:
      resources:
        limits:
          memory: 3G

  metadata-analysis-service:
    build: ./src/metadata-analysis-service
    container_name: metadata-analysis-service
    restart: unless-stopped
    environment:
      - KAFKA_BROKER=kafka:29092
      - PYTHONUNBUFFERED=1
    depends_on:
      kafka:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    volumes:
      - hf_cache_metadata:/root/.cache/huggingface
    networks:
      - socguard-net
    deploy:
      resources:
        limits:
          memory: 256M

  alert-persistence-service:
    build: ./src/alert-persistence-service
    container_name: alert-persistence-service
    restart: unless-stopped
    environment:
      - KAFKA_BROKER=kafka:29092
      - DB_HOST=postgres
      - DB_USER=socguard_user
      - DB_PASS=socguard_password
      - DB_NAME=socguard_db
      - PYTHONUNBUFFERED=1
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    networks:
      - socguard-net
    deploy:
      resources:
        limits:
          memory: 256M

  backend-api:
    build: ./src/backend-api
    container_name: backend-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKER=kafka:29092
      - DB_HOST=postgres
      - DB_USER=socguard_user
      - DB_PASS=socguard_password
      - DB_NAME=socguard_db
      - PYTHONUNBUFFERED=1
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - socguard-net
    volumes:
      - ./src/backend-api:/app
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  socguard-net:
    driver: bridge

volumes:
  postgres_data:
  hf_cache_text:
  hf_cache_image:
  hf_cache_audio:
  hf_cache_metadata:
